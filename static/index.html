<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skribe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0f12;
      --surface: #161a20;
      --border: #2a3038;
      --text: #e6e9ef;
      --text-muted: #8b929e;
      --accent: #7c9cf9;
      --accent-hover: #9bb3fb;
      --success: #7ee787;
      --error: #f97583;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      width: 100%;
      max-width: 560px;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 0.5rem;
    }
    .subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 2.5rem;
      text-align: center;
      background: var(--surface);
      transition: border-color 0.2s, background 0.2s;
      cursor: pointer;
    }
    .upload-zone:hover,
    .upload-zone.dragover {
      border-color: var(--accent);
      background: rgba(124, 156, 249, 0.06);
    }
    .upload-zone input {
      display: none;
    }
    .upload-zone .icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
      opacity: 0.9;
    }
    .upload-zone .hint {
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-top: 0.5rem;
    }
    .file-name {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.9rem;
      color: var(--accent);
      margin-top: 0.5rem;
      word-break: break-all;
    }
    .btn {
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .btn-primary {
      background: var(--accent);
      color: var(--bg);
      margin-top: 1.25rem;
      width: 100%;
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--accent-hover);
    }
    .btn-primary:active:not(:disabled) {
      transform: scale(0.98);
    }
    .btn-download {
      background: var(--surface);
      color: var(--accent);
      border: 1px solid var(--border);
      margin-top: 1rem;
      width: 100%;
    }
    .btn-download:hover {
      background: rgba(124, 156, 249, 0.1);
      border-color: var(--accent);
    }
    .status {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }
    .status.visible {
      display: block;
    }
    .status.loading {
      background: rgba(124, 156, 249, 0.12);
      color: var(--accent);
    }
    .progress-wrap {
      margin-top: 1rem;
      display: none;
    }
    .progress-wrap.visible {
      display: block;
    }
    .progress-bar {
      height: 8px;
      border-radius: 4px;
      background: var(--surface);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .progress-bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 4px;
      background: var(--accent);
      transition: width 0.3s ease;
    }
    .progress-bar-fill[style*="width: 0%"] {
      transition: none;
    }
    .progress-label {
      margin-top: 0.5rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .status.error {
      background: rgba(249, 117, 131, 0.12);
      color: var(--error);
    }
    .status.success {
      background: rgba(126, 231, 135, 0.12);
      color: var(--success);
    }
    .output-box {
      margin-top: 1.5rem;
      padding: 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: none;
    }
    .output-box.visible {
      display: block;
    }
    .output-box h3 {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 0 0 0.75rem;
    }
    .output-text {
      font-size: 0.95rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 240px;
      overflow-y: auto;
    }
    .output-text:empty::after {
      content: "No text transcribed.";
      color: var(--text-muted);
    }
    .device-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .device-chip.cuda {
      background: rgba(126, 231, 135, 0.2);
      color: var(--success);
      border: 1px solid rgba(126, 231, 135, 0.4);
    }
    .device-chip.cpu {
      background: rgba(139, 146, 158, 0.2);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .device-chip .device-name {
      font-weight: 500;
      text-transform: none;
      letter-spacing: 0;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="device-chip cpu" id="deviceChip" title="Compute device">Loading…</div>
    <h1>Skribe</h1>
    <p class="subtitle">A boyfriend-made transcriber app for Kimaya to use for Pharmacy studies.</p>
    <p class="subtitle">Upload audio and get English transcription as a .txt file.</p>

    <div class="upload-zone" id="dropZone" role="button" tabindex="0">
      <input type="file" id="fileInput" accept="audio/*,.mp3,.wav,.m4a,.webm,.ogg,.flac,.mp4,.mpeg,.mpga,.wma">
      <div class="icon">🎙️</div>
      <div>Drop an audio file here or click to choose</div>
      <div class="file-name" id="fileName"></div>
      <div class="hint">MP3, WAV, M4A, WebM, OGG, FLAC supported</div>
      <button type="button" class="btn btn-primary" id="submitBtn" disabled>Transcribe</button>
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="Transcription progress">
        <div class="progress-bar-fill" id="progressBarFill"></div>
      </div>
      <div class="progress-label" id="progressLabel"></div>
    </div>
    <div class="status" id="status"></div>
    <div class="output-box" id="outputBox">
      <h3>Transcription</h3>
      <div class="output-text" id="outputText"></div>
      <button type="button" class="btn btn-download" id="downloadBtn">Download as .txt</button>
    </div>
  </div>

  <script>
    const dropZone = document.getElementById("dropZone");
    const fileInput = document.getElementById("fileInput");
    const fileName = document.getElementById("fileName");
    const submitBtn = document.getElementById("submitBtn");
    const progressWrap = document.getElementById("progressWrap");
    const progressBarFill = document.getElementById("progressBarFill");
    const progressLabel = document.getElementById("progressLabel");
    const status = document.getElementById("status");
    const outputBox = document.getElementById("outputBox");
    const outputText = document.getElementById("outputText");
    const downloadBtn = document.getElementById("downloadBtn");
    const deviceChip = document.getElementById("deviceChip");

    let selectedFile = null;
    let lastResult = { text: "", filename: "" };

    (async function setDeviceChip() {
      try {
        const res = await fetch("/api/device");
        const d = await res.json();
        deviceChip.classList.toggle("cuda", d.cuda);
        deviceChip.classList.toggle("cpu", !d.cuda);
        if (d.cuda && d.device_name) {
          deviceChip.innerHTML = "CUDA <span class=\"device-name\">" + escapeHtml(d.device_name) + "</span>";
          deviceChip.title = "Using GPU: " + d.device_name;
        } else {
          deviceChip.textContent = "CPU";
          deviceChip.title = (d.hint || "Using CPU (slower than GPU). Have an NVIDIA GPU? See README for PyTorch + CUDA setup.");
        }
      } catch (_) {
        deviceChip.textContent = "CPU";
        deviceChip.title = "Device unknown";
      }
    })();
    function escapeHtml(s) {
      const div = document.createElement("div");
      div.textContent = s;
      return div.innerHTML;
    }

    function formatDuration(sec) {
      if (sec < 60) return sec + "s";
      const m = Math.floor(sec / 60);
      const s = Math.round(sec % 60);
      return s > 0 ? m + "m " + s + "s" : m + "m";
    }
    function setProgress(pct, labelText) {
      const p = Math.min(100, Math.max(0, pct));
      progressBarFill.style.width = p + "%";
      progressBarFill.parentElement.setAttribute("aria-valuenow", p);
      progressLabel.textContent = labelText || "";
    }
    function showStatus(message, type) {
      status.textContent = message;
      status.className = "status visible " + type;
      progressWrap.classList.toggle("visible", type === "loading");
      if (type !== "loading") setProgress(0, "");
    }
    function hideStatus() {
      status.className = "status";
      progressWrap.classList.remove("visible");
    }
    function setFile(file) {
      selectedFile = file;
      if (file) {
        fileName.textContent = file.name;
        submitBtn.disabled = false;
      } else {
        fileName.textContent = "";
        submitBtn.disabled = true;
      }
      outputBox.classList.remove("visible");
      hideStatus();
    }

    dropZone.addEventListener("click", (e) => {
      if (e.target.closest("button")) return;
      fileInput.click();
    });
    fileInput.addEventListener("change", () => setFile(fileInput.files[0] || null));

    dropZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropZone.classList.add("dragover");
    });
    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.classList.remove("dragover");
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith("audio/")) setFile(file);
      else if (file) setFile(file);
    });

    submitBtn.addEventListener("click", async () => {
      if (!selectedFile) return;
      submitBtn.disabled = true;
      const startTime = Date.now();
      showStatus("Starting…", "loading");
      setProgress(0, "0%");
      outputBox.classList.remove("visible");
      const form = new FormData();
      form.append("file", selectedFile);
      let pollAborted = false;
      try {
        const res = await fetch("/api/transcribe", { method: "POST", body: form });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          showStatus(data.detail || "Transcription failed.", "error");
          submitBtn.disabled = false;
          return;
        }
        const jobId = data.job_id;
        if (!jobId) {
          showStatus("Invalid response from server.", "error");
          submitBtn.disabled = false;
          return;
        }
        const poll = async () => {
          if (pollAborted) return;
          let sRes;
          try {
            sRes = await fetch("/api/transcribe/status/" + encodeURIComponent(jobId));
          } catch (e) {
            showStatus("Network error while checking status.", "error");
            submitBtn.disabled = false;
            return;
          }
          const s = await sRes.json().catch(() => ({}));
          if (!sRes.ok) {
            showStatus(s.detail || "Job not found or server error.", "error");
            submitBtn.disabled = false;
            return;
          }
          const progress = s.progress != null ? s.progress : 0;
          const elapsedSec = (Date.now() - startTime) / 1000;
          setProgress(progress, progress + "%");
          if (progress > 0 && progress < 100) {
            const estTotal = elapsedSec / (progress / 100);
            const estRemaining = Math.max(0, estTotal - elapsedSec);
            status.textContent = "Transcribing… " + progress + "% — about " + formatDuration(Math.ceil(estRemaining)) + " left";
          } else if (progress === 0) {
            status.textContent = "Transcribing… 0%";
          }
          if (s.status === "done") {
            lastResult = { text: s.text || "", filename: s.filename || "transcription" };
            outputText.textContent = lastResult.text || "";
            outputBox.classList.add("visible");
            const duration = s.duration_seconds != null ? s.duration_seconds : elapsedSec;
            showStatus("Done in " + formatDuration(duration) + ". You can download the .txt below.", "success");
            submitBtn.disabled = false;
            return;
          }
          if (s.status === "error") {
            showStatus(s.error || "Transcription failed.", "error");
            submitBtn.disabled = false;
            return;
          }
          setTimeout(poll, 400);
        };
        await poll();
      } catch (err) {
        pollAborted = true;
        showStatus("Network error: " + (err.message || "Could not reach server."), "error");
        submitBtn.disabled = false;
      }
    });

    downloadBtn.addEventListener("click", () => {
      const name = (lastResult.filename || "transcription") + "_transcription.txt";
      const blob = new Blob([lastResult.text], { type: "text/plain" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = name;
      a.click();
      URL.revokeObjectURL(a.href);
    });
  </script>
</body>
</html>
